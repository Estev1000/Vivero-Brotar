<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6a4f" />
      <stop offset="100%" stop-color="#1b4332" />
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40916c" />
      <stop offset="100%" stop-color="#52b788" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)" />
  
  <!-- Decorative leaf-like waves -->
  <path d="M-100,400 C150,200 350,200 600,400 C850,300 1050,200 1300,400 Z" fill="url(#leaf)" opacity="0.4" />
  <path d="M-100,400 C200,100 450,150 700,400 C950,250 1150,150 1300,400 Z" fill="url(#leaf)" opacity="0.2" />
  
  <circle cx="200" cy="100" r="150" fill="url(#leaf)" opacity="0.3" />
  <circle cx="1050" cy="300" r="200" fill="url(#leaf)" opacity="0.2" />
  
  <!-- Text -->
  <text x="600" y="190" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="80" font-weight="900" fill="#d8f3dc" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">GESTIÓN DE VIVERO</text>
  <text x="600" y="260" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="300" fill="#b7e4c7" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">Renovando la naturaleza, día a día</text>
</svg>
